<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Hill Valley</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; cursor: default; }
  canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
  }
  #era-label {
    position: fixed;
    bottom: 48px;
    left: 48px;
    font-family: 'Courier New', monospace;
    color: rgba(255, 255, 255, 0.7);
    z-index: 10;
    pointer-events: none;
    user-select: none;
    transition: opacity 1.5s ease;
    text-shadow: 0 0 12px rgba(0, 0, 0, 0.8);
  }
  #era-label .year {
    font-size: 56px;
    font-weight: bold;
    letter-spacing: 0.08em;
    display: block;
    color: rgba(255, 255, 255, 0.9);
    margin-top: 4px;
    line-height: 1;
  }
  #era-label .tag {
    font-size: 11px;
    letter-spacing: 0.45em;
    opacity: 0.6;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="era-label">
  <span class="tag" id="era-tag">Hill Valley</span>
  <span class="year" id="era-year">1985</span>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const PW = 480;
const PH = 270;

const pixelCanvas = document.createElement('canvas');
pixelCanvas.width = PW;
pixelCanvas.height = PH;
const pctx = pixelCanvas.getContext('2d');
pctx.imageSmoothingEnabled = false;

let W, H;
function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  ctx.imageSmoothingEnabled = false;
}
resize();
window.addEventListener('resize', resize);

// PALETTES
const PALETTES = {
  1885: {
    skyTop: '#1a1028', skyHigh: '#3a1f3a', skyMid: '#6b3a44', skyLow: '#b8644a', skyGlow: '#e89862',
    sun: '#ffc878', sunCore: '#fff0c0', cloud: '#7a5060', cloudLight: '#a07080',
    mountain: '#2a1f35', mountainMid: '#3d2d42',
    ground: '#2a1a0e', groundMid: '#3e2a18', groundHigh: '#5a3d22', road: '#3a2818', roadLine: '#8a6640',
    buildingWood: '#4a2e1a', buildingWoodLight: '#6b4428', buildingWoodDark: '#2a180a', buildingTrim: '#8a5a30',
    windowGlass: '#f5b858', windowFrame: '#3a2414',
    clockStone: '#6b5038', clockStoneLight: '#8a6a4a', clockStoneDark: '#3e2a18',
    clockFace: '#f0d8a0', clockFaceLight: '#ffe8b8', clockHands: '#2a1808', clockGold: '#c89848',
    vehicleBody: '#2e1e10', vehicleLight: '#5a3d22', vehicleWheel: '#1a0e06', vehicleDetail: '#8a5a30',
    signage: '#b8642a', signageText: '#f5e0a8', accent: '#c8441a'
  },
  1955: {
    skyTop: '#5a7da8', skyHigh: '#7ca0c0', skyMid: '#a8c4d8', skyLow: '#d0dce0', skyGlow: '#e8ecea',
    sun: '#fff5d0', sunCore: '#ffffff', cloud: '#ffffff', cloudLight: '#f8fcff',
    mountain: '#6a7a90', mountainMid: '#8a9aae',
    ground: '#3a3020', groundMid: '#5a4a30', groundHigh: '#8a7858', road: '#3a3a38', roadLine: '#e0c860',
    buildingWood: '#b88a5a', buildingWoodLight: '#d0a878', buildingWoodDark: '#7a5638', buildingTrim: '#e8d8b8',
    windowGlass: '#e8f0d0', windowFrame: '#4a3828',

  1985: {

    mountain: '#0a0e20', mountainMid: '#1a2030',
    ground: '#101010', groundMid: '#252530', groundHigh: '#3a3a48', road: '#1a1a1a', roadLine: '#d8c868',
    buildingWood: '#2a2838', buildingWoodLight: '#3a384a', buildingWoodDark: '#15131f', buildingTrim: '#4a4858',
    windowGlass: '#f8e868', windowFrame: '#0a080f',
    clockStone: '#3a3028', clockStoneLight: '#5a4838', clockStoneDark: '#1a1208',
    clockFace: '#d8c8a8', clockFaceLight: '#e8d8b8', clockHands: '#0a0602', clockGold: '#8a6a3a',
    vehicleBody: '#d0d0d8', vehicleLight: '#f0f0f8', vehicleWheel: '#080808', vehicleDetail: '#606068',
    vehicleGlow: '#6ac8f8', vehicleAccent: '#f84020',
    signage: '#ff2080', signageText: '#ffffff', accent: '#e83020',
    neonPink: '#ff40a0', neonBlue: '#40c8f8', neonCyan: '#40f8f0', starColor: '#fff8e0'
  },
  2015: {
    skyTop: '#1a0540', skyHigh: '#3a1068', skyMid: '#881a9a', skyLow: '#d8408a', skyGlow: '#ff88a0',
    sun: '#ff5888', sunCore: '#ffd0a8', cloud: '#5a1088', cloudLight: '#8a20b0',
    mountain: '#1a0828', mountainMid: '#3a1055',
    ground: '#1a0a28', groundMid: '#2a1438', groundHigh: '#4a2458', road: '#1a0520', roadLine: '#40e8f8',
    buildingWood: '#2a1848', buildingWoodLight: '#4a2868', buildingWoodDark: '#0a0418', buildingTrim: '#8a48a8',
    windowGlass: '#40f8f8', windowFrame: '#150428',
    clockStone: '#4a2868', clockStoneLight: '#6a3888', clockStoneDark: '#1a0828',
    clockFace: '#f0e8ff', clockFaceLight: '#ffffff', clockHands: '#150428', clockGold: '#ffee40',
    vehicleBody: '#2a60a8', vehicleLight: '#4090e0', vehicleWheel: '#081020', vehicleDetail: '#a8e8ff',
    vehicleGlow: '#40f8f8', vehicleAccent: '#ff2080',
    signage: '#ffee20', signageText: '#ff2080', accent: '#ffee20',
    neonPink: '#ff40a0', neonBlue: '#40a8ff', neonCyan: '#40f8f0', hologram: '#a0f0ff'
  }
};

// HELPERS
function px(x, y, color) { pctx.fillStyle = color; pctx.fillRect(x|0, y|0, 1, 1); }
function rect(x, y, w, h, color) { pctx.fillStyle = color; pctx.fillRect(x|0, y|0, w, h); }
function circle(cx, cy, r, color) {
  pctx.fillStyle = color;
  for (let y = -r; y <= r; y++) {
    const dx = Math.floor(Math.sqrt(r*r - y*y));
    pctx.fillRect(cx-dx, cy+y, dx*2+1, 1);
  }
}
function circleOutline(cx, cy, r, color) {
  let x = r, y = 0, err = 0;
  while (x >= y) {
    [[x,y],[y,x],[-y,x],[-x,y],[-x,-y],[-y,-x],[y,-x],[x,-y]].forEach(([dx,dy]) => px(cx+dx,cy+dy,color));
    y++;
    err += 1 + 2*y;
    if (2*(err-x)+1 > 0) { x--; err += 1 - 2*x; }
  }
}
function line(x0, y0, x1, y1, color) {
  x0|=0; y0|=0; x1|=0; y1|=0;
  const dx = Math.abs(x1-x0), dy = Math.abs(y1-y0);
  const sx = x0 < x1 ? 1 : -1, sy = y0 < y1 ? 1 : -1;
  let err = dx - dy;
  while (true) {
    px(x0, y0, color);
    if (x0 === x1 && y0 === y1) break;
    const e2 = 2*err;
    if (e2 > -dy) { err -= dy; x0 += sx; }
    if (e2 < dx) { err += dx; y0 += sy; }
  }
}
function hexToRgb(hex) { return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)]; }
function rgbToHex(r,g,b) { return '#' + [r,g,b].map(v => Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join(''); }
function lerpColor(c1, c2, t) {
  const a = hexToRgb(c1), b = hexToRgb(c2);
  return rgbToHex(a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t);
}

// CIEL
function drawSky(p) {
  const skyEnd = Math.floor(PH * 0.66);
  for (let y = 0; y < skyEnd; y++) {
    const t = y / skyEnd;
    let c;
    if (t < 0.25) c = lerpColor(p.skyTop, p.skyHigh, t/0.25);
    else if (t < 0.55) c = lerpColor(p.skyHigh, p.skyMid, (t-0.25)/0.3);
    else if (t < 0.85) c = lerpColor(p.skyMid, p.skyLow, (t-0.55)/0.3);
    else c = lerpColor(p.skyLow, p.skyGlow, (t-0.85)/0.15);
    rect(0, y, PW, 1, c);
  }
}

function drawCloud(x, y, size, colorLight, colorDark) {
  const s = size;
  circle(x+s*2, y, s, colorLight);
  circle(x+s*4, y-1, s+1, colorLight);
  circle(x+s*6, y, s, colorLight);
  rect(x+s, y, s*8, s, colorLight);
  rect(x+s*2, y+s, s*6, 1, colorDark);
}

function drawMountains(p) {
  const baseY = Math.floor(PH * 0.62);
  const pts1 = [[0,baseY+5],[40,baseY-12],[80,baseY-4],[140,baseY-20],[200,baseY-8],[260,baseY-18],[320,baseY-6],[390,baseY-16],[480,baseY-8],[480,baseY+5]];
  pctx.fillStyle = p.mountain;
  pctx.beginPath();
  pctx.moveTo(pts1[0][0], pts1[0][1]);
  for (const [x,y] of pts1) pctx.lineTo(x, y);
  pctx.fill();
  const pts2 = [[0,baseY+8],[60,baseY-4],[120,baseY+2],[180,baseY-10],[240,baseY-2],[300,baseY-8],[360,baseY],[420,baseY-6],[480,baseY+2],[480,baseY+8]];
  pctx.fillStyle = p.mountainMid;
  pctx.beginPath();
  pctx.moveTo(pts2[0][0], pts2[0][1]);
  for (const [x,y] of pts2) pctx.lineTo(x, y);
  pctx.fill();
}

function drawGround(p) {
  const groundStart = Math.floor(PH * 0.66);
  for (let y = groundStart; y < PH - 40; y++) {
    const t = (y - groundStart) / (PH - 40 - groundStart);
    rect(0, y, PW, 1, lerpColor(p.groundHigh, p.groundMid, t));
  }
  rect(0, PH - 40, PW, 40, p.road);
  rect(0, PH - 40, PW, 1, p.groundHigh);
  rect(0, PH - 41, PW, 1, p.groundMid);
}

function drawRoadLines(p, era) {
  if (era === 2015) {
    for (let x = 0; x < PW; x++) {
      const flick = (Math.sin(x * 0.3) + 1) * 0.5;
      px(x, PH - 22, lerpColor(p.roadLine, p.neonCyan, flick));
      px(x, PH - 21, p.roadLine);
    }
    for (let x = 0; x < PW; x += 3) px(x, PH - 10, p.neonCyan);
  } else {
    for (let x = 6; x < PW; x += 32) rect(x, PH - 22, 16, 2, p.roadLine);
  }
}

// CLOCK TOWER
function drawClockTower(p, era) {
  const baseX = 210, baseY = 60, bw = 42;
  rect(baseX-6, baseY+100, bw+12, 20, p.clockStoneDark);
  rect(baseX-4, baseY+98, bw+8, 3, p.clockStoneLight);
  rect(baseX-10, baseY+118, bw+20, 2, p.clockStoneDark);
  rect(baseX-8, baseY+116, bw+16, 2, p.clockStone);

  rect(baseX, baseY+30, bw, 70, p.clockStone);
  rect(baseX, baseY+30, 4, 70, p.clockStoneDark);
  rect(baseX+bw-3, baseY+30, 3, 70, p.clockStoneLight);
  rect(baseX-1, baseY+45, bw+2, 2, p.clockStoneDark);
  rect(baseX-1, baseY+46, bw+2, 1, p.clockStoneLight);
  rect(baseX-1, baseY+85, bw+2, 2, p.clockStoneDark);
  rect(baseX-1, baseY+86, bw+2, 1, p.clockStoneLight);

  rect(baseX+18, baseY+92, 6, 10, p.clockStoneDark);
  rect(baseX+19, baseY+93, 4, 8, p.buildingWood);

  const cx = baseX + bw/2, cy = baseY + 65, cr = 11;
  circle(cx, cy, cr+2, p.clockGold);
  circle(cx, cy, cr+1, p.clockStoneDark);
  circle(cx, cy, cr, p.clockFace);
  circle(cx, cy, cr-1, p.clockFaceLight);

  rect(cx-1, cy-cr+2, 2, 2, p.clockHands);
  rect(cx+cr-3, cy-1, 2, 2, p.clockHands);
  rect(cx-1, cy+cr-3, 2, 2, p.clockHands);
  rect(cx-cr+2, cy-1, 2, 2, p.clockHands);
  for (let a = 0; a < 12; a++) {
    if (a % 3 === 0) continue;
    const angle = (a/12) * Math.PI * 2 - Math.PI/2;
    px(cx + Math.cos(angle)*(cr-1), cy + Math.sin(angle)*(cr-1), p.clockHands);
  }

  const minAngle = (4/60) * Math.PI * 2 - Math.PI/2;
  line(cx, cy, cx + Math.cos(minAngle)*(cr-2), cy + Math.sin(minAngle)*(cr-2), p.clockHands);
  const hrAngle = ((10 + 4/60)/12) * Math.PI * 2 - Math.PI/2;
  line(cx, cy, cx + Math.cos(hrAngle)*(cr-5), cy + Math.sin(hrAngle)*(cr-5), p.clockHands);
  circle(cx, cy, 1, p.clockGold);

  rect(baseX+4, baseY+20, bw-8, 12, p.clockStone);
  rect(baseX+4, baseY+20, 3, 12, p.clockStoneDark);
  rect(baseX+bw-7, baseY+20, 3, 12, p.clockStoneLight);
  rect(baseX+2, baseY+18, bw-4, 3, p.clockStoneLight);
  rect(baseX+2, baseY+17, bw-4, 1, p.clockStoneDark);

  rect(baseX+10, baseY+8, bw-20, 10, p.clockStone);
  rect(baseX+12, baseY+2, bw-24, 6, p.clockStoneLight);
  rect(baseX+14, baseY+10, bw-28, 6, p.clockStoneDark);

  rect(baseX+18, baseY-6, 6, 10, p.clockStone);
  rect(baseX+18, baseY-6, 2, 10, p.clockStoneDark);
  rect(baseX+19, baseY-10, 4, 4, p.clockStoneLight);
  rect(baseX+20, baseY-14, 2, 4, p.clockStone);
  rect(baseX+20, baseY-22, 1, 8, p.clockHands);

  if (era === 1885) {
    circleOutline(cx, cy, cr+2, '#f5d890');
  } else if (era === 1985) {
    line(cx-6, cy+14, cx+3, cy+38, p.clockStoneDark);
    line(cx-5, cy+14, cx+4, cy+38, p.clockStoneDark);
    rect(baseX+8, baseY+55, 3, 4, p.windowGlass);
    rect(baseX+bw-11, baseY+55, 3, 4, p.windowGlass);
  } else if (era === 2015) {
    rect(baseX-1, baseY+100, bw+2, 1, p.neonCyan);
    rect(baseX-1, baseY+30, bw+2, 1, p.neonPink);
  } else if (era === 1955) {
    rect(baseX+8, baseY+55, 3, 4, p.windowGlass);
    rect(baseX+bw-11, baseY+55, 3, 4, p.windowGlass);
  }
}

// LEFT BUILDING
function drawLeftBuilding(p, era) {
  const x = 20, y = 130, w = 120, h = 100;
  rect(x, y, w, h, p.buildingWood);
  rect(x, y, 3, h, p.buildingWoodDark);
  rect(x+w-2, y, 2, h, p.buildingWoodDark);
  rect(x-2, y-3, w+4, 4, p.buildingWoodDark);
  rect(x-2, y-3, w+4, 2, p.buildingTrim);
  rect(x, y+30, w, 2, p.buildingWoodDark);
  rect(x, y+29, w, 1, p.buildingTrim);

  for (let i = 0; i < 3; i++) {
    const wx = x + 12 + i*34, wy = y + 8;
    rect(wx-1, wy-1, 22, 16, p.windowFrame);
    rect(wx, wy, 20, 14, p.windowGlass);
    rect(wx+9, wy, 2, 14, p.windowFrame);
    rect(wx, wy+6, 20, 1, p.windowFrame);
    rect(wx+1, wy+1, 8, 2, lerpColor(p.windowGlass, '#ffffff', 0.5));
  }

  rect(x+52, y+45, 16, 50, p.buildingWoodDark);
  rect(x+53, y+46, 14, 48, p.buildingWood);
  rect(x+55, y+50, 10, 20, p.windowGlass);
  rect(x+55, y+50, 10, 2, lerpColor(p.windowGlass, '#ffffff', 0.5));
  px(x+64, y+75, p.clockGold);

  rect(x+6, y+45, 40, 35, p.windowFrame);
  rect(x+8, y+47, 36, 31, p.windowGlass);
  rect(x+10, y+49, 14, 4, lerpColor(p.windowGlass, '#ffffff', 0.4));
  rect(x+10, y+55, 6, 2, lerpColor(p.windowGlass, '#ffffff', 0.3));

  rect(x+74, y+45, 40, 35, p.windowFrame);
  rect(x+76, y+47, 36, 31, p.windowGlass);
  rect(x+78, y+49, 14, 4, lerpColor(p.windowGlass, '#ffffff', 0.4));

  if (era === 1955 || era === 1985) {
    rect(x-1, y+42, w+2, 3, p.accent);
    rect(x-1, y+45, w+2, 1, p.buildingWoodDark);
    for (let i = 0; i < w+2; i += 6) rect(x-1+i, y+45, 3, 2, p.accent);
  }
  if (era === 1885) {
    rect(x+2, y+80, 3, 15, p.buildingWoodLight);
    rect(x+w-5, y+80, 3, 15, p.buildingWoodLight);
    rect(x+2, y+82, w-4, 1, p.buildingWoodLight);
    // Enseigne Saloon
    rect(x+30, y+32, 60, 10, p.buildingWoodDark);
    rect(x+31, y+33, 58, 8, p.signage);
    drawPixelText(x+45, y+35, 'SALOON', p.signageText);
  }

  if (era === 1985) {
    rect(x+30, y-14, 60, 10, p.buildingWoodDark);
    rect(x+32, y-12, 56, 6, p.signage);
    drawPixelText(x+40, y-10, "LOU'S", '#ffffff');
    rect(x+30, y-4, 60, 1, lerpColor(p.signage, '#ffffff', 0.3));
  } else if (era === 2015) {
    rect(x+20, y-20, 80, 14, p.buildingWoodDark);
    rect(x+22, y-18, 76, 10, p.neonCyan);
    drawPixelText(x+34, y-15, 'CAFE 80', p.signageText);
    rect(x+22, y-8, 76, 2, p.neonPink);
    for (let i = 0; i < 8; i++) px(x+25+i*9, y-15, '#ffffff');
  } else if (era === 1955) {
    rect(x+30, y-14, 60, 10, p.buildingWoodDark);
    rect(x+32, y-12, 56, 6, p.signage);
    drawPixelText(x+40, y-10, "LOU'S", p.signageText);
  }
}

// RIGHT BUILDING
function drawRightBuilding(p, era) {
  const x = 300, y = 115, w = 130, h = 115;
  rect(x, y, w, h, p.buildingWood);
  rect(x, y, 3, h, p.buildingWoodDark);
  rect(x+w-3, y, 3, h, p.buildingWoodDark);
  rect(x-3, y-4, w+6, 5, p.buildingWoodDark);
  rect(x-3, y-4, w+6, 2, p.buildingTrim);

  for (let r = 0; r < 2; r++) {
    for (let i = 0; i < 4; i++) {
      const wx = x + 10 + i*30, wy = y + 10 + r*32;
      rect(wx-1, wy-1, 20, 22, p.windowFrame);
      const lit = ((r*4 + i + (era === 1985 ? 0 : 1)) % 3) !== 0;
      rect(wx, wy, 18, 20, p.windowGlass);
      rect(wx, wy+9, 18, 1, p.windowFrame);
      rect(wx+8, wy, 2, 20, p.windowFrame);
      if (lit) rect(wx+1, wy+1, 6, 3, lerpColor(p.windowGlass, '#ffffff', 0.4));
    }
  }

  rect(x+5, y+78, 55, 30, p.windowFrame);
  rect(x+7, y+80, 51, 26, p.windowGlass);
  rect(x+9, y+82, 20, 4, lerpColor(p.windowGlass, '#ffffff', 0.35));

  rect(x+68, y+78, 55, 30, p.windowFrame);
  rect(x+70, y+80, 51, 26, p.windowGlass);
  rect(x+72, y+82, 20, 4, lerpColor(p.windowGlass, '#ffffff', 0.35));

  rect(x-2, y+75, w+4, 3, p.accent);

  rect(x+w+8, y+30, 36, 85, p.buildingWoodDark);
  rect(x+w+9, y+30, 34, 2, p.buildingWood);
  for (let r = 0; r < 3; r++) {
    for (let i = 0; i < 2; i++) {
      rect(x+w+12+i*14, y+38+r*20, 8, 10, p.windowGlass);
    }
  }

  if (era === 1955) {
    rect(x+20, y-18, 90, 14, p.buildingWoodDark);
    rect(x+22, y-16, 86, 10, p.signage);
    drawPixelText(x+40, y-13, 'TEXACO', p.signageText);
  } else if (era === 1985) {
    rect(x+10, y-22, 110, 16, p.buildingWoodDark);
    rect(x+12, y-20, 106, 12, p.signage);
    drawPixelText(x+30, y-15, 'TWIN PINES', p.signageText);
    rect(x+10, y-22, 110, 1, p.neonPink);
    rect(x+10, y-7, 110, 1, p.neonPink);
  } else if (era === 2015) {
    drawJaws19(x+40, y-40, p);
  }
}

function drawJaws19(x, y, p) {
  pctx.fillStyle = p.hologram;
  pctx.fillRect(x, y+12, 40, 8);
  pctx.fillRect(x-4, y+14, 8, 6);
  pctx.fillRect(x+40, y+10, 4, 4);
  pctx.fillRect(x+44, y+8, 4, 8);
  for (let i = 0; i < 3; i++) px(x+2+i*3, y+18, '#ffffff');
  pctx.fillStyle = p.hologram;
  pctx.fillRect(x+15, y+6, 8, 8);
  for (let i = 0; i < 8; i++) if (i % 2 === 0) px(x+i*6, y+22, p.neonCyan);
  rect(x+6, y, 32, 4, p.accent);
  drawPixelText(x+10, y+1, 'JAWS 19', '#ffffff');
}

// PIXEL FONT
const PIXEL_FONT = {
  'A':[0b010,0b101,0b111,0b101,0b101],'B':[0b110,0b101,0b110,0b101,0b110],
  'C':[0b011,0b100,0b100,0b100,0b011],'D':[0b110,0b101,0b101,0b101,0b110],
  'E':[0b111,0b100,0b110,0b100,0b111],'F':[0b111,0b100,0b110,0b100,0b100],
  'G':[0b011,0b100,0b101,0b101,0b011],'H':[0b101,0b101,0b111,0b101,0b101],
  'I':[0b111,0b010,0b010,0b010,0b111],'J':[0b001,0b001,0b001,0b101,0b010],
  'K':[0b101,0b110,0b100,0b110,0b101],'L':[0b100,0b100,0b100,0b100,0b111],
  'M':[0b10001,0b11011,0b10101,0b10001,0b10001],'N':[0b101,0b111,0b111,0b111,0b101],
  'O':[0b010,0b101,0b101,0b101,0b010],'P':[0b110,0b101,0b110,0b100,0b100],
  'Q':[0b010,0b101,0b101,0b111,0b011],'R':[0b110,0b101,0b110,0b101,0b101],
  'S':[0b011,0b100,0b010,0b001,0b110],'T':[0b111,0b010,0b010,0b010,0b010],
  'U':[0b101,0b101,0b101,0b101,0b011],'V':[0b101,0b101,0b101,0b010,0b010],
  'W':[0b10001,0b10001,0b10101,0b11011,0b10001],'X':[0b101,0b010,0b010,0b010,0b101],
  'Y':[0b101,0b101,0b010,0b010,0b010],'Z':[0b111,0b001,0b010,0b100,0b111],
  '0':[0b010,0b101,0b101,0b101,0b010],'1':[0b010,0b110,0b010,0b010,0b111],
  '2':[0b110,0b001,0b010,0b100,0b111],'5':[0b111,0b100,0b110,0b001,0b110],
  '8':[0b010,0b101,0b010,0b101,0b010],'9':[0b011,0b101,0b011,0b001,0b110],
  "'":[0b010,0b010,0b000,0b000,0b000],' ':[0b000,0b000,0b000,0b000,0b000]
};

function drawPixelText(x, y, text, color) {
  let cursorX = x;
  for (const ch of text.toUpperCase()) {
    const glyph = PIXEL_FONT[ch];
    if (!glyph) { cursorX += 4; continue; }
    const width = ch === 'M' || ch === 'W' ? 5 : 3;
    for (let row = 0; row < 5; row++) {
      const bits = glyph[row];
      for (let col = 0; col < width; col++) {
        if (bits & (1 << (width - 1 - col))) px(cursorX + col, y + row, color);
      }
    }
    cursorX += width + 1;
  }
}

// VEHICLES
function drawVehicle(era, p) {
  const y = PH - 28, x = 260;
  if (era === 1885) drawHorseWagon(x, y, p);
  else if (era === 1955) drawFiftiesCar(x, y, p);
  else if (era === 1985) drawDeLorean(x, y, p);
  else if (era === 2015) drawFlyingCar(x, y, p);
}

function drawHorseWagon(x, y, p) {
  const hx = x - 55;
  rect(hx, y-3, 20, 10, p.vehicleBody);
  rect(hx+1, y-3, 18, 2, p.vehicleDetail);
  rect(hx-4, y-8, 6, 6, p.vehicleBody);
  rect(hx-8, y-10, 6, 5, p.vehicleBody);
  rect(hx-9, y-8, 2, 3, p.vehicleBody);
  px(hx-5, y-12, p.vehicleBody);
  px(hx-3, y-12, p.vehicleBody);
  px(hx-6, y-8, p.vehicleDetail);
  rect(hx-2, y-10, 2, 4, p.vehicleLight);
  rect(hx, y-11, 4, 3, p.vehicleLight);
  rect(hx+2, y+7, 2, 8, p.vehicleBody);
  rect(hx+6, y+7, 2, 8, p.vehicleBody);
  rect(hx+14, y+7, 2, 8, p.vehicleBody);
  rect(hx+18, y+7, 2, 8, p.vehicleBody);
  rect(hx+2, y+14, 2, 1, p.vehicleWheel);
  rect(hx+6, y+14, 2, 1, p.vehicleWheel);
  rect(hx+14, y+14, 2, 1, p.vehicleWheel);
  rect(hx+18, y+14, 2, 1, p.vehicleWheel);
  rect(hx+20, y-5, 4, 8, p.vehicleLight);
  rect(hx+20, y-1, 14, 1, p.vehicleDetail);

  const wx = x - 5;
  rect(wx, y-5, 50, 12, p.vehicleLight);
  for (let i = 0; i < 50; i += 5) rect(wx+i, y-5, 1, 12, p.vehicleBody);

  rect(wx-2, y-8, 54, 1, p.vehicleDetail);

  circle(wx+40, y+10, 4, p.vehicleLight);

function drawDeLorean(x, y, p) {

function drawFlyingCar(x, y, p) {

// ATMOSPHERE
function drawAtmosphere(p, era) {
  if (era === 1885) {
    circle(380, 70, 16, p.sun);
    circle(380, 70, 11, lerpColor(p.sun, p.sunCore, 0.5));
    circle(380, 70, 6, p.sunCore);
    for (let i = 0; i < 8; i++) {
      const angle = (i/8) * Math.PI * 2;
      line(380 + Math.cos(angle)*20, 70 + Math.sin(angle)*20,
           380 + Math.cos(angle)*24, 70 + Math.sin(angle)*24,
           lerpColor(p.sun, p.skyGlow, 0.5));
    }
    drawCloud(50, 35, 2, p.cloudLight, p.cloud);
    drawCloud(160, 25, 2, p.cloudLight, p.cloud);
    drawCloud(410, 40, 2, p.cloudLight, p.cloud);
    for (let i = 0; i < 4; i++) {
      const bx = 100 + i*30, by = 50 + (i%2)*6;
      px(bx, by, p.clockHands);
      px(bx+1, by-1, p.clockHands);
      px(bx+2, by, p.clockHands);
      px(bx-1, by-1, p.clockHands);
      px(bx-2, by, p.clockHands);
    }
  } else if (era === 1955) {
    circle(100, 50, 9, p.sunCore);
    circle(100, 50, 6, '#ffffff');
    drawCloud(30, 30, 2, p.cloud, p.mountainMid);
    drawCloud(180, 22, 2, p.cloud, p.mountainMid);
    drawCloud(250, 40, 2, p.cloud, p.mountainMid);
    drawCloud(380, 28, 3, p.cloud, p.mountainMid);
    drawCloud(430, 50, 2, p.cloud, p.mountainMid);
    rect(320, 60, 8, 1, '#ffffff');
    rect(322, 59, 3, 1, '#ffffff');
    for (let i = 0; i < 20; i++) if ((i * 7) % 10 < 6) px(320-i, 60, '#ffffff');
  } else if (era === 1985) {
    circle(400, 40, 10, p.sunCore);
    circle(402, 40, 9, p.skyHigh);
    px(398, 38, p.cloud);
    px(396, 42, p.cloud);
    px(403, 44, p.cloud);
    circleOutline(400, 40, 13, lerpColor(p.sunCore, p.skyTop, 0.6));
    circleOutline(400, 40, 16, lerpColor(p.sunCore, p.skyTop, 0.85));
    const stars = [
      [30,20],[55,12],[85,25],[110,8],[130,18],[160,28],[190,14],[220,22],
      [270,30],[310,18],[340,8],[370,20],[440,22],[450,12],[25,40],[75,48],
      [150,50],[230,42],[290,38],[355,50],[420,60],[150,12],[240,10]
    ];
    for (const [sx, sy] of stars) {
      px(sx, sy, p.starColor);
      if (((sx+sy)%7) < 3) {
        px(sx-1, sy, lerpColor(p.starColor, p.skyTop, 0.5));
        px(sx+1, sy, lerpColor(p.starColor, p.skyTop, 0.5));
        px(sx, sy-1, lerpColor(p.starColor, p.skyTop, 0.5));
        px(sx, sy+1, lerpColor(p.starColor, p.skyTop, 0.5));
      }
    }
    drawCloud(100, 60, 2, p.cloudLight, p.cloud);
    drawCloud(350, 70, 2, p.cloudLight, p.cloud);
  } else if (era === 2015) {
    circle(380, 85, 24, p.sun);
    circle(380, 85, 18, lerpColor(p.sun, p.sunCore, 0.5));
    circle(380, 85, 12, p.sunCore);
    for (let i = 0; i < 5; i++) rect(356, 78+i*3, 48, 1, p.skyMid);
    const gridY = 178;
    for (let x = 0; x < PW; x += 16) {
      const xOffset = (x - PW/2) * ((x - PW/2)/240) * 0.3;
      line(x, gridY, x + xOffset, gridY + 15, p.neonPink);
    }
    for (let y = 0; y < 15; y += 3) {
      const lineY = gridY + y, alpha = 1 - y/15;
      rect(0, lineY, PW, 1, lerpColor(p.neonPink, p.skyLow, 1 - alpha));
    }
    for (let i = 0; i < 5; i++) {
      const vx = 60 + i*80, vy = 40 + (i%3)*15;
      const c = [p.neonCyan, p.neonPink, p.hologram][i%3];
      rect(vx, vy, 3, 1, c);
      rect(vx+3, vy, 1, 1, lerpColor(c, p.skyMid, 0.5));
    }
    for (let i = 0; i < 15; i++) {
      const sx = (i*37) % PW, sy = (i*23) % 40;
      px(sx, sy, p.hologram);
    }
  }
}

// STREET DETAILS

    rect(155, PH-48, 5, 8, '#1a4a8a');

function drawLamppost(x, y, p, era) {
  if (era === 2015) {
    rect(x, y-20, 2, 20, p.vehicleDetail);
    rect(x-2, y-25, 6, 5, p.vehicleDetail);
    rect(x-3, y-24, 8, 3, p.neonCyan);
    for (let i = 0; i < 6; i++) px(x+(i%3-1)*4, y-27+i, lerpColor(p.neonCyan, p.skyMid, i/6));
  } else if (era === 1985) {
    rect(x, y-25, 2, 25, p.clockHands);
    rect(x-3, y-28, 8, 3, p.clockHands);
    rect(x-2, y-27, 6, 2, p.windowGlass);
    circle(x+1, y-27, 4, lerpColor(p.windowGlass, p.skyTop, 0.7));
  } else if (era === 1955) {
    rect(x, y-22, 2, 22, p.clockHands);
    rect(x-1, y-24, 4, 2, p.clockHands);
    rect(x-2, y-26, 6, 3, p.sunCore);
  }
}

// COMPOSITION
function drawScene(era) {
  const p = PALETTES[era];
  pctx.clearRect(0, 0, PW, PH);
  drawSky(p);
  drawAtmosphere(p, era);
  drawMountains(p);
  drawGround(p);
  drawClockTower(p, era);
  drawLeftBuilding(p, era);
  drawRightBuilding(p, era);
  drawRoadLines(p, era);
  drawStreetDetails(p, era);
  drawVehicle(era, p);
  return pctx.getImageData(0, 0, PW, PH);
}

// BOUCLE
const ERAS = [1885, 1955, 1985, 2015];
const sceneImages = {};
for (const era of ERAS) sceneImages[era] = drawScene(era);

const pixelThresholds = new Float32Array(PW * PH);
for (let i = 0; i < pixelThresholds.length; i++) pixelThresholds[i] = Math.random();

const morphBuffer = pctx.createImageData(PW, PH);

function renderMorphed(fromEra, toEra, progress) {
  const from = sceneImages[fromEra].data;
  const to = sceneImages[toEra].data;
  const out = morphBuffer.data;
  for (let i = 0, pi = 0; i < from.length; i += 4, pi++) {
    if (pixelThresholds[pi] < progress) {
      out[i] = to[i]; out[i+1] = to[i+1]; out[i+2] = to[i+2]; out[i+3] = to[i+3];
    } else {
      out[i] = from[i]; out[i+1] = from[i+1]; out[i+2] = from[i+2]; out[i+3] = from[i+3];
    }
  }
  pctx.putImageData(morphBuffer, 0, 0);
}

function renderToScreen() {
  const scale = Math.max(W/PW, H/PH);
  const targetW = PW * scale, targetH = PH * scale;
  const offsetX = (W - targetW)/2, offsetY = (H - targetH)/2;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  ctx.drawImage(pixelCanvas, offsetX, offsetY, targetW, targetH);
}

const PHASE_DURATION = 10000, MORPH_DURATION = 5000;
const CYCLE = PHASE_DURATION + MORPH_DURATION;
let startTime = performance.now();
const eraTagEl = document.getElementById('era-tag');
const eraYearEl = document.getElementById('era-year');
const eraLabelEl = document.getElementById('era-label');
const ERA_TAGS = {
  1885: 'Hill Valley · far west',
  1955: 'Hill Valley · the fifties',
  1985: 'Hill Valley · present day',
  2015: 'Hill Valley · the future'
};
let currentDisplayedEra = null;

function loop(now) {
  const elapsed = now - startTime;
  const totalCycle = CYCLE * 4;
  const t = elapsed % totalCycle;
  const segment = Math.floor(t / CYCLE);
  const segmentTime = t - segment * CYCLE;
  const fromEra = ERAS[segment];
  const toEra = ERAS[(segment+1) % 4];
  let displayedEra;

  if (segmentTime < PHASE_DURATION) {
    pctx.putImageData(sceneImages[fromEra], 0, 0);
    displayedEra = fromEra;
  } else {
    const morphProgress = (segmentTime - PHASE_DURATION) / MORPH_DURATION;
    const eased = easeInOut(morphProgress);
    renderMorphed(fromEra, toEra, eased);
    displayedEra = eased > 0.5 ? toEra : fromEra;
  }

  renderToScreen();

  if (displayedEra !== currentDisplayedEra) {
    eraLabelEl.style.opacity = 0;
    setTimeout(() => {
      eraTagEl.textContent = ERA_TAGS[displayedEra];
      eraYearEl.textContent = displayedEra;
      eraLabelEl.style.opacity = 1;
    }, 600);
    currentDisplayedEra = displayedEra;
  }

  requestAnimationFrame(loop);
}

function easeInOut(t) { return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2; }

requestAnimationFrame(loop);
</script>
